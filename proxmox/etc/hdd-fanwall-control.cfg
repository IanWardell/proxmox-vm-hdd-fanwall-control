# Proxmox HDD fan wall control config

# VM-written input file shared via virtiofs.
INPUT_FILE="/var/lib/fan-control/vm-unraid-hdd/hdd_temp_status.env"

# Known-good hwmon path for this host. If this path becomes invalid after a
# reboot or hardware change, the script will try to auto-detect a replacement
# that contains the configured pwm and rpm files.
HWMON_PATH="/sys/class/hwmon/hwmon5"
PWM_ENABLE_NAME="pwm2_enable"
PWM_NAME="pwm2"
RPM_NAME="fan6_input"

# Optional regex to prefer a specific hwmon name during auto-detection.
HWMON_NAME_REGEX=""

LOG_TAG="fan-control"
VIRTIOFS_TAG="fan-control-virtiofs"

SAFE_FALLBACK_PWM=204
MAX_FILE_AGE_SECONDS=120
READ_TIMEOUT_SECONDS=2

# The fan wall must never go below this value.
MIN_PWM=120
MAX_PWM=255

# You can customise the fan curve here using PWM_AT_<temp_in_celsius>=<pwm> format
PWM_AT_30=120
PWM_AT_37=125
PWM_AT_40=130
PWM_AT_42=135
PWM_AT_44=140
PWM_AT_47=160
PWM_AT_50=204
PWM_AT_55=235
PWM_AT_60=255

HOT_DRIVE_COUNT_BUMP_THRESHOLD=4
HOT_DRIVE_PWM_BUMP=16

# Optional CPU-aware control for AIO plus fan-wall setups.
# Enable when the fan wall also needs to feed CPU radiator airflow.
AIO_FANWALL_ENABLE="no"

# Generic CPU temp input. On this host, coretemp Package id 0 is:
# /sys/class/hwmon/hwmon4/temp1_input
CPU_TEMP_HWMON_PATH="/sys/class/hwmon/hwmon4"
CPU_TEMP_INPUT_NAME="temp1_input"
CPU_TEMP_MAX_VALID_C=105

# CPU fan curve. Used only when AIO_FANWALL_ENABLE="yes".
# The controller applies whichever target PWM is higher: HDD curve or CPU curve.
CPU_PWM_AT_50=120
CPU_PWM_AT_60=140
CPU_PWM_AT_70=170
CPU_PWM_AT_80=204
CPU_PWM_AT_90=235
CPU_PWM_AT_95=255

HYSTERESIS_C=2
